name: Build and Publish

on:
    push:
        branches:
            - '**'
    pull_request:
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    MAJOR_VERSION: 1

jobs:
    calculate-version:
        name: Calculate Version
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.version-string.outputs.version }}

        steps:
            -   name: Generate version string
                id: version-string
                shell: bash
                run: |
                    version="${{ env.MAJOR_VERSION }}.$(date -u '+%Y.%m.%d-%H.%M')-$(echo "${GITHUB_SHA}" | cut -c1-7)"
                    echo "version=${version}" >> "$GITHUB_OUTPUT"

    build:
        name: Build
        runs-on: ubuntu-latest
        needs:
            - calculate-version

        permissions:
            contents: read

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4

            -   name: Set up JDK 17
                uses: actions/setup-java@v4
                with:
                    java-version: '17'
                    distribution: 'temurin'

            -   name: Validate Gradle wrapper
                uses: gradle/actions/wrapper-validation@v4

            -   name: Build
                run: ./gradlew clean assemble --refresh-dependencies --profile --stacktrace -Pversion=${{ needs.calculate-version.outputs.version }}


    publish:
        name: Publish to GitHub Packages
        runs-on: ubuntu-latest
        needs:
            - build
            - calculate-version
        #if: (github.ref_name == 'master' && github.event_name == 'push')

        permissions:
            contents: read
            packages: write

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4

            -   name: Set up JDK 17
                uses: actions/setup-java@v4
                with:
                    java-version: '17'
                    distribution: 'temurin'

            -   name: Publish to GitHub Packages
                run: ./gradlew publish --stacktrace -Pversion=${{ needs.calculate-version.outputs.version }}
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
